<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5b7af8"/>
      <stop offset="100%" stop-color="#7c5af8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#shine)"/>

  <!-- Bug body (oval) -->
  <ellipse cx="32" cy="35" rx="12" ry="14" fill="#ffffff" fill-opacity="0.95"/>

  <!-- Bug head (circle) -->
  <circle cx="32" cy="20" r="7" fill="#ffffff" fill-opacity="0.95"/>

  <!-- Antenna left -->
  <line x1="27" y1="15" x2="21" y2="9" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="20" cy="8" r="2" fill="#ffffff" fill-opacity="0.8"/>

  <!-- Antenna right -->
  <line x1="37" y1="15" x2="43" y2="9" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="44" cy="8" r="2" fill="#ffffff" fill-opacity="0.8"/>

  <!-- Eyes -->
  <circle cx="28.5" cy="20" r="2" fill="#5b7af8"/>
  <circle cx="35.5" cy="20" r="2" fill="#5b7af8"/>

  <!-- Legs left -->
  <line x1="20" y1="30" x2="13" y2="27" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="36" x2="12" y2="35" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="42" x2="13" y2="44" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>

  <!-- Legs right -->
  <line x1="44" y1="30" x2="51" y2="27" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="36" x2="52" y2="35" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="42" x2="51" y2="44" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>

  <!-- Body center line -->
  <line x1="32" y1="24" x2="32" y2="48" stroke="#5b7af8" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>

  <!-- Body segments -->
  <line x1="22" y1="32" x2="42" y2="32" stroke="#5b7af8" stroke-width="1.2" stroke-opacity="0.3"/>
  <line x1="21" y1="39" x2="43" y2="39" stroke="#5b7af8" stroke-width="1.2" stroke-opacity="0.3"/>
</svg>
